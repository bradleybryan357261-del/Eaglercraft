<!DOCTYPE html>
<html>
<head>
  <title>BlockWorld Terrain</title>
  <style>
    body { margin:0; overflow:hidden; font-family:sans-serif; }
    #chatBox {
      position:absolute;
      bottom:10px;
      left:10px;
      width:300px;
      z-index:10;
    }
    #messages {
      background:rgba(0,0,0,0.6);
      color:white;
      height:100px;
      overflow-y:auto;
      padding:5px;
      font-size:14px;
    }
    #chatInput {
      width:100%;
    }
  </style>
</head>
<body>

<div id="chatBox">
  <div id="messages"></div>
  <input id="chatInput" placeholder="Type message..." 
    onkeydown="if(event.key==='Enter') sendChat()">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ------------------------
// Scene and Renderer
// ------------------------
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ------------------------
// Terrain Generation
// ------------------------
let groundGeo = new THREE.BoxGeometry(1,1,1);
function getHeight(x,z){
  // Simple terrain: hills using sine waves
  return Math.floor(Math.sin(x/5)*2 + Math.cos(z/5)*2);
}

let terrainLimit = 20;
for(let x=-terrainLimit;x<terrainLimit;x++){
  for(let z=-terrainLimit;z<terrainLimit;z++){
    let y = getHeight(x,z);
    let material = new THREE.MeshBasicMaterial({color: 0x00aa00});
    if(y>1) material.color.set(0x228822); // higher blocks darker
    let cube = new THREE.Mesh(groundGeo, material);
    cube.position.set(x,y/2,z);
    cube.scale.y = y>0 ? y : 1;
    scene.add(cube);
  }
}

// ------------------------
// Player
// ------------------------
let playerGeo = new THREE.BoxGeometry(1,2,1);
let playerMat = new THREE.MeshBasicMaterial({color:0xff0000});
let player = new THREE.Mesh(playerGeo, playerMat);
player.position.set(0, getHeight(0,0)+1,0);
scene.add(player);

// Camera
camera.position.set(player.position.x, player.position.y+1, player.position.z+5);

// ------------------------
// Movement
// ------------------------
let velocityY=0;
let gravity=-0.01;
let onGround=true;

let keys={};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

// Mouse look
document.body.addEventListener("click", ()=>document.body.requestPointerLock());
let yaw=0, pitch=0;
document.addEventListener("mousemove", e=>{
  if(document.pointerLockElement===document.body){
    yaw-=e.movementX*0.002;
    pitch-=e.movementY*0.002;
    pitch=Math.max(-1.5, Math.min(1.5, pitch));
  }
});

// ------------------------
// Animate
// ------------------------
function animate(){
  requestAnimationFrame(animate);
  
  let speed=0.1;
  let forwardX = -Math.sin(yaw);
  let forwardZ = -Math.cos(yaw);
  let rightX = Math.cos(yaw);
  let rightZ = -Math.sin(yaw);

  if(keys["w"]){ player.position.x += forwardX*speed; player.position.z += forwardZ*speed; }
  if(keys["s"]){ player.position.x -= forwardX*speed; player.position.z -= forwardZ*speed; }
  if(keys["a"]){ player.position.x -= rightX*speed; player.position.z -= rightZ*speed; }
  if(keys["d"]){ player.position.x += rightX*speed; player.position.z += rightZ*speed; }
  if(keys[" "] && onGround){ velocityY=0.2; onGround=false; }

  velocityY+=gravity;
  player.position.y+=velocityY;

  // Collision with terrain
  let terrainHeight = getHeight(Math.round(player.position.x), Math.round(player.position.z));
  if(player.position.y <= terrainHeight+1){
    player.position.y = terrainHeight+1;
    velocityY=0;
    onGround=true;
  }

  // Boundaries
  player.position.x = Math.max(-terrainLimit, Math.min(terrainLimit-1, player.position.x));
  player.position.z = Math.max(-terrainLimit, Math.min(terrainLimit-1, player.position.z));

  // Camera
  camera.position.set(player.position.x, player.position.y+1, player.position.z+5);
  camera.rotation.order="YXZ";
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  renderer.render(scene,camera);
}
animate();

// ------------------------
// Chat
// ------------------------
function sendChat(){
  let input=document.getElementById("chatInput");
  let msg=input.value;
  if(!msg) return;
  let box=document.getElementById("messages");
  box.innerHTML+="You: "+msg+"<br>";
  box.scrollTop=box.scrollHeight;
  input.value="";
}
</script>
</body>
</html>
