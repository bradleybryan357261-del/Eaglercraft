<!DOCTYPE html>
<html>
<head>
  <title>BlockWorld Single Player</title>
  <style>
    body { margin:0; overflow:hidden; font-family:sans-serif; }
    #chatBox {
      position:absolute;
      bottom:10px;
      left:10px;
      width:300px;
      z-index:10;
    }
    #messages {
      background:rgba(0,0,0,0.6);
      color:white;
      height:100px;
      overflow-y:auto;
      padding:5px;
      font-size:14px;
    }
    #chatInput {
      width:100%;
    }
  </style>
</head>
<body>

<div id="chatBox">
  <div id="messages"></div>
  <input id="chatInput" placeholder="Type message..." 
    onkeydown="if(event.key==='Enter') sendChat()">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let groundGeo = new THREE.BoxGeometry(1,1,1);
let groundMat = new THREE.MeshBasicMaterial({color:0x00aa00});
for(let x=-20;x<20;x++){
  for(let z=-20;z<20;z++){
    let cube=new THREE.Mesh(groundGeo,groundMat);
    cube.position.set(x,0,z);
    scene.add(cube);
  }
}

let playerGeo = new THREE.BoxGeometry(1,2,1);
let playerMat = new THREE.MeshBasicMaterial({color:0xff0000});
let player = new THREE.Mesh(playerGeo,playerMat);
player.position.y=1;
scene.add(player);

camera.position.set(0,2,5);

let velocityY=0;
let gravity=-0.01;
let onGround=true;

let keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.addEventListener("click",()=>document.body.requestPointerLock());

let yaw=0;
let pitch=0;
document.addEventListener("mousemove",e=>{
  if(document.pointerLockElement===document.body){
    yaw-=e.movementX*0.002;
    pitch-=e.movementY*0.002;
    pitch=Math.max(-1.5,Math.min(1.5,pitch));
  }
});

function animate(){
  requestAnimationFrame(animate);
  let speed=0.1;
  if(keys["w"]){ player.position.x-=Math.sin(yaw)*speed; player.position.z-=Math.cos(yaw)*speed; }
  if(keys["s"]){ player.position.x+=Math.sin(yaw)*speed; player.position.z+=Math.cos(yaw)*speed; }
  if(keys["a"]){ player.position.x-=Math.cos(yaw)*speed; player.position.z+=Math.sin(yaw)*speed; }
  if(keys["d"]){ player.position.x+=Math.cos(yaw)*speed; player.position.z-=Math.sin(yaw)*speed; }
  if(keys[" "] && onGround){ velocityY=0.2; onGround=false; }

  velocityY+=gravity;
  player.position.y+=velocityY;
  if(player.position.y<=1){ player.position.y=1; velocityY=0; onGround=true; }

  camera.position.copy(player.position);
  camera.position.y+=1;
  camera.rotation.order="YXZ";
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  renderer.render(scene,camera);
}
animate();

function sendChat(){
  let input=document.getElementById("chatInput");
  let msg=input.value;
  if(!msg) return;
  let box=document.getElementById("messages");
  box.innerHTML+="You: "+msg+"<br>";
  box.scrollTop=box.scrollHeight;
  input.value="";
}
</script>
</body>
</html>
