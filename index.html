<!DOCTYPE html>
<html>
<head>
  <title>BlockWorld Multiplayer</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #menu {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="menu">
  <input id="roomInput" placeholder="Room name">
  <button onclick="joinRoom()">Join Room</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let geometry = new THREE.BoxGeometry(1,1,1);
let material = new THREE.MeshBasicMaterial({color: 0x00aa00});

for(let x=-10;x<10;x++){
  for(let z=-10;z<10;z++){
    let cube = new THREE.Mesh(geometry, material);
    cube.position.set(x,0,z);
    scene.add(cube);
  }
}

camera.position.y = 2;
camera.position.z = 5;

let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let playerMaterial = new THREE.MeshBasicMaterial({color: 0xff0000});
let playerCube = new THREE.Mesh(geometry, playerMaterial);
playerCube.position.y = 1;
scene.add(playerCube);

let otherPlayers = {};

function animate(){
  requestAnimationFrame(animate);

  if(keys["w"]) playerCube.position.z -= 0.1;
  if(keys["s"]) playerCube.position.z += 0.1;
  if(keys["a"]) playerCube.position.x -= 0.1;
  if(keys["d"]) playerCube.position.x += 0.1;

  camera.position.x = playerCube.position.x;
  camera.position.z = playerCube.position.z + 5;
  camera.lookAt(playerCube.position);

  sendPosition();
  renderer.render(scene,camera);
}
animate();

let peer;
let connections = [];

function joinRoom(){
  let room = document.getElementById("roomInput").value;
  peer = new Peer(room);

  peer.on('connection', conn=>{
    setupConnection(conn);
  });

  peer.on('open', id=>{
    tryConnect(room);
    document.getElementById("menu").style.display="none";
  });
}

function tryConnect(room){
  let conn = peer.connect(room);
  setupConnection(conn);
}

function setupConnection(conn){
  connections.push(conn);

  conn.on('data', data=>{
    if(!otherPlayers[conn.peer]){
      let cube = new THREE.Mesh(geometry,new THREE.MeshBasicMaterial({color:0x0000ff}));
      cube.position.y=1;
      scene.add(cube);
      otherPlayers[conn.peer]=cube;
    }
    otherPlayers[conn.peer].position.set(data.x,1,data.z);
  });
}

function sendPosition(){
  connections.forEach(conn=>{
    conn.send({x:playerCube.position.x,z:playerCube.position.z});
  });
}
</script>
</body>
</html>
